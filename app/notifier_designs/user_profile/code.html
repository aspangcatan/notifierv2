<script>
        // Simple micro-interaction for the logout button
        document.querySelector('button .text-error').closest('button').addEventListener('click', () => {
            if(confirm('Are you sure you want to log out? Any unsaved changes in clinical charts might be lost.')) {
                console.log('Logging out...');
                // Application logout logic would go here
            }
        });

        // Hover effect enhancement for glass cards
        const cards = document.querySelectorAll('.glass-card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
