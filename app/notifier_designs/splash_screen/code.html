<style>
        .medical-pattern {
            background-color: #005eb8;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.2; }
            14% { transform: scale(1.1); opacity: 0.4; }
            28% { transform: scale(1); opacity: 0.2; }
            42% { transform: scale(1.1); opacity: 0.4; }
            70% { transform: scale(1); opacity: 0.2; }
        }

        .animate-heartbeat {
            animation: heartbeat 2s ease-in-out infinite;
        }

        .loader-bar {
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            background: #ffffff;
            width: 30%;
            left: -30%;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { left: -30%; width: 30%; }
            50% { width: 60%; }
            100% { left: 100%; width: 30%; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container h-screen flex flex-col overflow-hidden items-center justify-center relative font-body-md text-body-md">
<!-- Background Medical Theme Icon -->
<div class="absolute inset-0 flex items-center justify-center opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[400px] text-white animate-heartbeat" style="font-variation-settings: 'FILL' 0, 'wght' 100;">
            ecg_heart
        </span>
</div>
<!-- Main Content Shell -->
<div class="z-10 flex flex-col items-center">
<!-- Logo Container -->
<div class="mb-gutter flex flex-col items-center gap-base">
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center shadow-lg mb-md">
<span class="material-symbols-outlined text-primary text-[48px]" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                    notifications_active
                </span>
</div>
<!-- Predicted Component Label: TopAppBar headline mapped as Logo -->
<h1 class="font-display-lg text-display-lg text-white tracking-tight">
                Notifier
            </h1>
<p class="text-white/80 font-label-md text-label-md tracking-widest uppercase mt-xs">
                Clinical Communication
            </p>
</div>
</div>
<!-- Loading Section -->
<div class="absolute bottom-20 flex flex-col items-center gap-sm">
<div class="loader-bar">
<div class="loader-progress"></div>
</div>
<span class="text-white/60 font-label-md text-label-md tracking-normal">
            Initializing secure systems...
        </span>
</div>
<!-- Background Subtle Image (Medical Context) -->
<div class="absolute inset-0 -z-10">
<div class="w-full h-full opacity-5 grayscale mix-blend-overlay">
<img alt="Hospital Corridor" class="w-full h-full object-cover" data-alt="A sophisticated medical environment featuring a high-end hospital corridor with soft, clinical blue lighting and polished surfaces. The aesthetic is extremely minimalist and modern, utilizing a color palette of deep navy and crisp white. The atmosphere is professional, quiet, and trustworthy, reflecting a state-of-the-art healthcare facility focused on efficiency and patient care." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAb19K5EvxYnaHh0b-HwZB6MlL-G73YvECYhDNGkeNyGvfy65wA2kW-zAejaxLNlJ11sUR4F0D-UmCXgOG5bhjnsSDfi-Kq1fE05MCkyQboKenedQRCtYCFgdHcVtUtPd-Svqb8GW5CNRXYjqbnIBPD2mJBEV-s1H1YFkeMV1Jv6K9_1aTG4ng2Rk4RfFoGvFLropbNKO4MLsNqUg8PIxi_FHnq76WQde4yK0cDUaZopndI573G86BRa7iAvW1mnmcysPljdHEbfmY"/>
</div>
</div>
<!-- Micro-interaction JS -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle fade-in of elements
            const mainContent = document.querySelector('.z-10');
            const loader = document.querySelector('.absolute.bottom-20');
            
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(10px)';
            loader.style.opacity = '0';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 0.8s cubic-bezier(0.22, 1, 0.36, 1)';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 300);

            setTimeout(() => {
                loader.style.transition = 'opacity 1s ease-in';
                loader.style.opacity = '1';
            }, 800);
        });
    </script>
</body></html>
